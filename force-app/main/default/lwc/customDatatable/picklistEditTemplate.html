<!--
    Edit template for the custom "picklist" column type.
    Uses a native HTML <select> (not lightning-combobox) to avoid
    script errors from combobox internal event handling conflicts.
    The "data-inputable" attribute tells the datatable to treat this
    element as the editable input for the cell.
-->
<template>
    <span class="slds-select_container">
        <select class="slds-select" data-inputable="true" onchange={handlePicklistChange}>
            <template for:each={typeAttributes.options} for:item="opt">
                <option key={opt.value} value={opt.value}>{opt.label}</option>
            </template>
        </select>
    </span>
</template>
